<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Tarjeta</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --c-bg-front: #383833;
        --c-green: #0f6e56;
        --c-green-dark: #085041;
        --c-mint: #9fe1cb;
        --c-mint-light: #e1f5ee;
        --c-accent-name: #5dcaa5;
        --c-text-secondary: #888;
      }

      .scene {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
        padding: 2rem 0;
      }
      .label {
        font-size: 11px;
        color: var(--c-text-secondary);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 10px;
        text-align: center;
      }

      .card {
        width: 356px;
        height: 200px;
        border-radius: 14px;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
        border: 2.5px solid var(--c-mint);
      }
      .card svg.bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .cf-accent-bar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: #bfdceb;
        border-radius: 0 2px 2px 0;
        z-index: 4;
      }
      .cf-content {
        position: absolute;
        inset: 0;
        padding: 22px 22px 18px 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        z-index: 3;
      }
      .cf-tag {
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.16em;
        color: var(--c-mint);
        text-transform: uppercase;
        margin-bottom: 5px;
      }
      .cf-name-first {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        line-height: 1.1;
      }
      .cf-name-last {
        font-size: 20px;
        font-weight: 700;
        color: var(--c-accent-name);
        line-height: 1.1;
      }
      .cf-role {
        margin-top: 7px;
        font-size: 9.5px;
        color: rgba(255, 255, 255, 0.45);
        font-style: italic;
      }
      .cf-stack {
        display: flex;
        gap: 5px;
        margin-top: 9px;
        flex-wrap: wrap;
      }
      .cf-pill {
        font-size: 8px;
        font-weight: 700;
        color: var(--c-mint);
        border: 1px solid rgba(159, 225, 203, 0.3);
        border-radius: 20px;
        padding: 2px 9px;
        letter-spacing: 0.04em;
      }
      .cf-bottom {
        display: flex;
        flex-direction: column;
        gap: 5px;
        border-top: 0.5px solid rgba(255, 255, 255, 0.09);
        padding-top: 10px;
      }
      .cf-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.6);
      }

      .center {
        position: absolute;
        inset: 0;
        z-index: 3;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 9px;
      }
      .cb-name {
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        line-height: 1.3;
        text-align: center;
      }
      .cb-name span {
        color: var(--c-mint);
      }
      .cb-divider {
        width: 40px;
        height: 1.5px;
        background: rgba(255, 255, 255, 0.28);
      }
      .cb-tagline {
        font-size: 9.5px;
        color: rgba(255, 255, 255, 0.58);
        font-style: italic;
        text-align: center;
        line-height: 1.55;
      }
      .cb-github {
        font-size: 10px;
        color: var(--c-mint);
        font-weight: 700;
        letter-spacing: 0.05em;
      }

      .info-strip {
        background: var(--c-mint-light);
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 11px;
        color: var(--c-green-dark);
        width: 356px;
        text-align: center;
        line-height: 1.8;
      }
      .info-strip strong {
        color: var(--c-green);
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div>
        <p class="label">Cara frontal</p>
        <div class="card">
          <svg
            class="bg"
            id="svg-front"
            viewBox="0 0 356 200"
            preserveAspectRatio="xMidYMid slice"
          ></svg>
          <div class="cf-accent-bar"></div>
          <div class="cf-content">
            <div>
              <div class="cf-tag" id="cf-tag"></div>
              <div class="cf-name-first" id="cf-name-first"></div>
              <div class="cf-name-last" id="cf-name-last"></div>
              <div class="cf-role" id="cf-role"></div>
              <div class="cf-stack" id="cf-stack"></div>
            </div>
            <div class="cf-bottom">
              <div class="cf-row">
                <svg
                  width="10"
                  height="10"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#9fe1cb"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="2" y="4" width="20" height="16" rx="2" />
                  <polyline points="2,4 12,13 22,4" />
                </svg>
                <span id="cf-email"></span>
              </div>
              <div class="cf-row">
                <svg
                  width="10"
                  height="10"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#9fe1cb"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.02 1.18 2 2 0 012 .02h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"
                  />
                </svg>
                <span id="cf-phone"></span>
                &nbsp;·&nbsp;
                <svg
                  width="10"
                  height="10"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#9fe1cb"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
                  <circle cx="12" cy="10" r="3" />
                </svg>
                <span id="cf-location"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div>
        <p class="label">Cara trasera</p>
        <div class="card">
          <svg
            class="bg"
            id="svg-back"
            viewBox="0 0 356 200"
            preserveAspectRatio="xMidYMid slice"
          ></svg>
          <div class="center">
            <div class="cb-name" id="cb-name"></div>
            <div class="cb-divider"></div>
            <div class="cb-tagline" id="cb-tagline"></div>
            <div class="cb-github" id="cb-github"></div>
          </div>
        </div>
      </div>

      <div class="info-strip">
        <strong>#161614</strong> fondo frontal &nbsp;·&nbsp;
        <strong>#0F6E56</strong> verde &nbsp;·&nbsp;
        <strong>#085041</strong> verde oscuro<br />
        <strong>#9FE1CB</strong> menta &nbsp;·&nbsp;
        <strong>#E1F5EE</strong> verde claro &nbsp;·&nbsp;
        <strong>#5DCAA5</strong> acento nombre
      </div>
    </div>

    <!-- ① Edita SOLO este archivo para cambiar los datos de la tarjeta -->
    <script src="card-data.js"></script>

    <!-- ② Motor: no necesitas modificar nada aquí abajo -->
    <script>
      const NS = "http://www.w3.org/2000/svg";
      function el(tag, attrs = {}) {
        const node = document.createElementNS(NS, tag);
        for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
        return node;
      }

      function populate() {
        const d = CARD;
        document.getElementById("cf-tag").textContent = d.tag;
        document.getElementById("cf-name-first").textContent = d.nameFirst;
        document.getElementById("cf-name-last").textContent = d.nameLast;
        document.getElementById("cf-role").textContent = d.role;
        document.getElementById("cf-email").textContent = d.email;
        document.getElementById("cf-phone").textContent = d.phone;
        document.getElementById("cf-location").textContent = d.location;

        const stackEl = document.getElementById("cf-stack");
        d.stack.forEach((tech) => {
          const span = document.createElement("span");
          span.className = "cf-pill";
          span.textContent = tech;
          stackEl.appendChild(span);
        });

        document.getElementById("cb-name").innerHTML =
          `${d.nameFirst}<br><span>${d.nameLast}</span>`;
        document.getElementById("cb-tagline").innerHTML = d.tagline.replace(
          /\n/g,
          "<br>",
        );
        document.getElementById("cb-github").textContent = d.github;
      }

      function buildFrontBg(svg) {
        svg.appendChild(
          el("rect", { width: 356, height: 200, fill: "#383833" }),
        );
        [
          { cx: 320, cy: -30, r: 180, fill: "#0f6e56" },
          { cx: 240, cy: 10, r: 130, fill: "#085041" },
          { cx: 356, cy: 140, r: 90, fill: "#0f6e56", opacity: ".45" },
          {
            cx: 270,
            cy: 160,
            r: 55,
            fill: "none",
            stroke: "rgba(255,255,255,0.06)",
            "stroke-width": "1",
          },
          {
            cx: 270,
            cy: 160,
            r: 34,
            fill: "none",
            stroke: "rgba(255,255,255,0.04)",
            "stroke-width": "1",
          },
          { cx: 312, cy: 52, r: 7, fill: "#9fe1cb", opacity: ".18" },
          { cx: 312, cy: 52, r: 3.5, fill: "#9fe1cb", opacity: ".45" },
        ].forEach((a) => svg.appendChild(el("circle", a)));

        const g = el("g", { fill: "rgba(255,255,255,0.10)" });
        [158, 166, 174].forEach((cy) =>
          [22, 30, 38, 46, 54].forEach((cx) =>
            g.appendChild(el("circle", { cx, cy, r: "1.2" })),
          ),
        );
        svg.appendChild(g);
      }

      function buildBackBg(svg) {
        const HEX = "0,-20 17,-10 17,10 0,20 -17,10 -17,-10";
        const defs = el("defs");
        const grad = el("radialGradient", {
          id: "rfade",
          cx: "50%",
          cy: "50%",
          r: "50%",
        });
        grad.appendChild(
          el("stop", {
            offset: "0%",
            "stop-color": "#0f6e56",
            "stop-opacity": ".92",
          }),
        );
        grad.appendChild(
          el("stop", {
            offset: "100%",
            "stop-color": "#0f6e56",
            "stop-opacity": "0",
          }),
        );
        defs.appendChild(grad);
        svg.appendChild(defs);
        svg.appendChild(
          el("rect", { width: 356, height: 200, fill: "#085041" }),
        );

        [
          {
            y: 20,
            x0: 17,
            filled: [1, 3, 5, 7, 9],
            op: [0.13, 0.11, 0.1, 0.08, 0.07, 0.07, 0.08, 0.1, 0.12, 0.13],
          },
          {
            y: 60,
            x0: 0,
            filled: [0, 2, 4, 6, 8, 10],
            op: [
              0.12, 0.1, 0.09, 0.07, 0.06, 0.06, 0.06, 0.07, 0.09, 0.11, 0.12,
            ],
          },
          {
            y: 100,
            x0: 17,
            filled: [1, 3, 5, 7, 9],
            op: [0.12, 0.09, 0.07, 0.05, 0.04, 0.04, 0.05, 0.07, 0.09, 0.12],
          },
          {
            y: 140,
            x0: 0,
            filled: [0, 2, 4, 6, 8, 10],
            op: [
              0.11, 0.09, 0.07, 0.05, 0.04, 0.04, 0.05, 0.07, 0.09, 0.11, 0.12,
            ],
          },
          {
            y: 180,
            x0: 17,
            filled: [1, 3, 5, 7, 9],
            op: [0.13, 0.11, 0.09, 0.07, 0.05, 0.05, 0.07, 0.09, 0.11, 0.13],
          },
        ].forEach(({ y, x0, filled, op }) =>
          op.forEach((o, i) =>
            svg.appendChild(
              el("polygon", {
                points: HEX,
                transform: `translate(${x0 + i * 35},${y})`,
                fill: filled.includes(i) ? "#0f6e56" : "none",
                stroke: `rgba(255,255,255,${o})`,
                "stroke-width": ".7",
              }),
            ),
          ),
        );

        svg.appendChild(
          el("ellipse", {
            cx: 178,
            cy: 100,
            rx: 135,
            ry: 80,
            fill: "url(#rfade)",
          }),
        );
        svg.appendChild(
          el("polygon", {
            points: "0,-26 22,-13 22,13 0,26 -22,13 -22,-13",
            transform: "translate(318,28)",
            fill: "#085041",
            stroke: "#9fe1cb",
            "stroke-width": "1.2",
            opacity: ".8",
          }),
        );
        svg.appendChild(
          el("circle", {
            cx: 318,
            cy: 28,
            r: 5,
            fill: "#9fe1cb",
            opacity: ".55",
          }),
        );
        svg.appendChild(
          el("rect", { x: 0, y: 193, width: 356, height: 7, fill: "#085041" }),
        );
        svg.appendChild(
          el("rect", {
            x: 0,
            y: 193,
            width: 356,
            height: 2,
            fill: "#9fe1cb",
            opacity: ".3",
          }),
        );
      }

      populate();
      buildFrontBg(document.getElementById("svg-front"));
      buildBackBg(document.getElementById("svg-back"));
    </script>
  </body>
</html>
